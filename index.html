<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyCast — Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
 
  <!-- Boot / loading screen -->
  <div class="boot" id="boot">
    <div class="boot-cloud">
      <svg viewBox="0 0 100 60" width="90">
        <ellipse cx="35" cy="35" rx="28" ry="20" fill="#fff" opacity="0.9"/>
        <ellipse cx="60" cy="28" rx="22" ry="18" fill="#fff" opacity="0.95"/>
        <ellipse cx="48" cy="22" rx="18" ry="15" fill="#fff"/>
      </svg>
    </div>
    <p>Finding your sky…</p>
  </div>
 
  <!-- Ambient full-page layer -->
  <div class="weather-animations" id="animations"></div>
 
  <!-- Navbar -->
  <nav class="navbar">
    <div class="brand">
      <span class="brand-mark">◐</span> SkyCast
    </div>
    <div class="nav-links">
      <a href="#" class="active">Home</a>
      <a href="#forecast-section">Forecast</a>
      <a href="#about-section">About</a>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
      <span id="themeIcon">🌙</span>
    </button>
  </nav>
 
  <div class="page-wrap">
 
    <!-- Top clock/date -->
    <div class="clock-widget">
      <div class="clock-day" id="clockDay">—</div>
      <div class="clock-time" id="clockTime">--:--</div>
      <div class="clock-date" id="clockDate">—</div>
    </div>
 
    <div class="card" id="mainCard">
 
      <div class="search">
        <div class="search-inputwrap">
          <input type="text" id="cityInput" placeholder="Search a city…" spellcheck="false" autocomplete="off">
          <div class="suggestions" id="suggestions"></div>
        </div>
        <button id="searchBtn" aria-label="Search">
          <span id="searchBtnIcon">🔍</span>
        </button>
      </div>
 
      <div class="recent" id="recentWrap">
        <span class="recent-label">Recent:</span>
        <div class="recent-chips" id="recentChips"></div>
      </div>
 
      <!-- Error state -->
      <div class="error-panel" id="errorPanel">
        <div class="error-emoji">❌</div>
        <h3>City not found</h3>
        <p>We couldn't find that place. Check the spelling and try again.</p>
        <button id="errorRetry">Try again</button>
      </div>
 
      <!-- Weather content -->
      <div class="weather" id="weatherContent">
        <div class="icon-stage" id="iconStage"></div>

        <h1 class="temp" id="temp">--°</h1>
        <h2 class="condition" id="condition">—</h2>
        <p class="feels-like" id="feelsLike">Feels like --°</p>
        <h3 class="city" id="city">—</h3>
 
        <div class="details-grid" id="detailsGrid"></div>
 
        <div class="aqi-card" id="aqiCard">
          <div class="aqi-label">Air Quality</div>
          <div class="aqi-value" id="aqiValue">—</div>
          <div class="aqi-status" id="aqiStatus">—</div>
        </div>
      </div>
 
    </div>
 
    <!-- Hourly forecast -->
    <section class="panel" id="hourlyPanel">
      <h3 class="panel-title">Hourly forecast</h3>
      <div class="hourly-scroll" id="hourlyScroll"></div>
    </section>
 
    <!-- Daily forecast -->
    <section class="panel" id="forecast-section">
      <h3 class="panel-title">5-day forecast</h3>
      <div class="daily-list" id="dailyList"></div>
    </section>
